<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Fundo circular: sol do sertao -->
  <defs>
    <radialGradient id="sol" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#f4a14a"/>
      <stop offset="60%" stop-color="#c9622a"/>
      <stop offset="100%" stop-color="#8b3d15"/>
    </radialGradient>
  </defs>

  <!-- Circulo de fundo -->
  <circle cx="50" cy="50" r="48" fill="url(#sol)" stroke="#3a2418" stroke-width="3"/>

  <!-- Raios de sol decorativos -->
  <g stroke="#f0c850" stroke-width="1.5" opacity="0.5">
    <line x1="50" y1="8" x2="50" y2="14"/>
    <line x1="50" y1="86" x2="50" y2="92"/>
    <line x1="8" y1="50" x2="14" y2="50"/>
    <line x1="86" y1="50" x2="92" y2="50"/>
  </g>

  <!-- Tronco do cacto (mandacaru) -->
  <rect x="44" y="38" width="12" height="50" rx="5" fill="#2e5c2a" stroke="#1a3818" stroke-width="1.5"/>

  <!-- Braco esquerdo do cacto -->
  <path d="M 32 55 L 32 48 Q 32 44 36 44 L 40 44 L 40 65 L 36 65 Q 32 65 32 61 Z"
        fill="#2e5c2a" stroke="#1a3818" stroke-width="1.5"/>

  <!-- Braco direito do cacto -->
  <path d="M 68 50 L 68 43 Q 68 39 64 39 L 60 39 L 60 60 L 64 60 Q 68 60 68 56 Z"
        fill="#2e5c2a" stroke="#1a3818" stroke-width="1.5"/>

  <!-- Espinhos / detalhes -->
  <g fill="#1a3818">
    <circle cx="50" cy="48" r="1"/>
    <circle cx="50" cy="58" r="1"/>
    <circle cx="50" cy="68" r="1"/>
    <circle cx="50" cy="78" r="1"/>
    <circle cx="36" cy="54" r="0.8"/>
    <circle cx="64" cy="49" r="0.8"/>
  </g>

  <!-- Flor amarela no topo do cacto -->
  <circle cx="50" cy="36" r="3" fill="#f0c850" stroke="#8b6914" stroke-width="0.8"/>
  <circle cx="50" cy="36" r="1" fill="#8b6914"/>
</svg>
